# docker-compose.prod.yml — Lightsail 프로덕션 배포용
# MySQL은 Lightsail Managed DB 사용 (컨테이너 X)
#
# 사용법:
#   1. cp .env.example .env && nano .env  (실제 값 입력)
#   2. docker compose -f docker-compose.prod.yml up -d --build

services:
  # ── Frontend (Nginx + React SPA) ──
  # 주의: 80/443 은 호스트 시스템 nginx(/etc/nginx/sites-available/sendit)가 SSL 터미네이션.
  #       여기서 포트를 공개로 열면 시스템 nginx 가 바인딩 실패해 HTTPS 가 죽는다. (과거 사고 이력)
  #       반드시 127.0.0.1 바인딩을 유지할 것.
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
        VITE_WS_BASE_URL: /ws
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      - backend
    restart: always
    networks:
      - sendit-network

  # ── Backend (Spring Boot) ──
  backend:
    build:
      context: ./backend
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      # ── Timezone (JVM + LocalDateTime.now() 기준) ──
      # 모든 저장 시각을 한국시간으로 일관화 → 라이브 채팅/로그 시간 일치.
      - TZ=Asia/Seoul
      # ── DB (Lightsail Managed MySQL) ──
      - MYSQL_HOST=${DB_HOST}
      - MYSQL_PORT=${DB_PORT:-3306}
      - MYSQL_DATABASE=${DB_NAME:-sendit}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      # ── Security ──
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_SECRET=${ENCRYPTION_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - APP_BASE_URL=${APP_BASE_URL}
      # ── Instagram API ──
      - INSTAGRAM_APP_ID=${INSTAGRAM_APP_ID:-}
      - INSTAGRAM_APP_SECRET=${INSTAGRAM_APP_SECRET:-}
      - INSTAGRAM_OAUTH_REDIRECT_URI=${INSTAGRAM_OAUTH_REDIRECT_URI:-}
      - INSTAGRAM_WEBHOOK_VERIFY_TOKEN=${INSTAGRAM_WEBHOOK_VERIFY_TOKEN:-}
      # ── 토스페이먼츠 정기결제 (빌링키) — MID: bill_sendiomau ──
      - TOSS_CLIENT_KEY=${TOSS_CLIENT_KEY:-test_ck_4yKeq5bgrp56k0GoJ4Rx8GX0lzW6}
      - TOSS_SECRET_KEY=${TOSS_SECRET_KEY:-test_sk_kYG57Eba3GRnGEBvmlwE8pWDOxmA}
      - TOSS_PRICE_STARTER=${TOSS_PRICE_STARTER:-19900}
      - TOSS_PRICE_PRO=${TOSS_PRICE_PRO:-49900}
      - TOSS_PRICE_BUSINESS=${TOSS_PRICE_BUSINESS:-149900}
      # ── Email ──
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      # ── Monitoring ──
      - SENTRY_DSN=${SENTRY_DSN:-}
    volumes:
      - backend-logs:/app/logs
      - backend-uploads:/app/uploads
    restart: always
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - sendit-network

volumes:
  backend-logs:
  backend-uploads:

networks:
  sendit-network:
    driver: bridge
