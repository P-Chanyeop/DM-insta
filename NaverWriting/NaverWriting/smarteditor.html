<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartEditor2</title>
    <!-- SmartEditor2 CSS -->
    <link rel="stylesheet" type="text/css" href="css/smart_editor2.css">
</head>
<body>
    <!-- SmartEditor2 Textarea -->
    <form id="editorForm" method="post">
        <textarea name="content" id="smartEditor" rows="10" cols="100"></textarea>
    </form>
    <!-- SmartEditor2 JavaScript -->
    <script type="text/javascript" src="js/service/HuskyEZCreator.js"></script>
    <script type="text/javascript">
        var oEditor;
        nhn.husky.EZCreator.createInIFrame({
            oAppRef: oEditor,
            elPlaceHolder: "smartEditor",
            sSkinURI: "SmartEditor2Skin.html",
            fCreator: "createSEditor2"
        });
    </script>
</body>
</html>
