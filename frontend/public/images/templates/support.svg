<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ECFDF5"/>
      <stop offset="100%" style="stop-color:#F0FDF4"/>
    </linearGradient>
    <linearGradient id="support" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43E97B"/>
      <stop offset="100%" style="stop-color:#38F9D7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" rx="16" fill="url(#bg)"/>
  <!-- Headset icon -->
  <g transform="translate(60, 50)">
    <circle cx="60" cy="70" r="45" stroke="url(#support)" stroke-width="4" fill="none" opacity="0.3"/>
    <path d="M25 80 C25 50 40 30 60 30 C80 30 95 50 95 80" stroke="url(#support)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <rect x="15" y="70" width="18" height="35" rx="9" fill="url(#support)"/>
    <rect x="87" y="70" width="18" height="35" rx="9" fill="url(#support)"/>
    <!-- Mic -->
    <path d="M95 105 Q95 120 80 120 L75 120" stroke="url(#support)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="72" cy="120" r="5" fill="url(#support)"/>
  </g>
  <!-- Chat bubbles -->
  <g transform="translate(160, 140)">
    <rect width="80" height="28" rx="14" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="14" y="18" font-size="8" fill="#475569" font-family="sans-serif">배송 문의요</text>
  </g>
  <g transform="translate(170, 175)">
    <rect width="90" height="28" rx="14" fill="url(#support)" opacity="0.9"/>
    <text x="10" y="18" font-size="8" fill="white" font-family="sans-serif">확인해드릴게요!</text>
  </g>
  <!-- Phone -->
  <g transform="translate(270, 30)">
    <rect width="105" height="170" rx="14" fill="white" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="10" y="18" width="85" height="135" rx="4" fill="#F8FAFC"/>
    <!-- FAQ list -->
    <rect x="14" y="24" width="77" height="24" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <text x="20" y="36" font-size="7" fill="#475569" font-family="sans-serif">배송 조회</text>
    <text x="20" y="44" font-size="6" fill="#94A3B8" font-family="sans-serif">주문번호로 조회</text>
    <rect x="14" y="52" width="77" height="24" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <text x="20" y="64" font-size="7" fill="#475569" font-family="sans-serif">교환/환불</text>
    <text x="20" y="72" font-size="6" fill="#94A3B8" font-family="sans-serif">7일 이내 가능</text>
    <rect x="14" y="80" width="77" height="24" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <text x="20" y="92" font-size="7" fill="#475569" font-family="sans-serif">상담원 연결</text>
    <text x="20" y="100" font-size="6" fill="#94A3B8" font-family="sans-serif">실시간 상담</text>
    <!-- Status -->
    <rect x="14" y="112" width="77" height="34" rx="8" fill="url(#support)" opacity="0.1"/>
    <text x="22" y="128" font-size="7" fill="#059669" font-family="sans-serif">자동 응답 활성</text>
    <text x="22" y="140" font-size="6" fill="#6EE7B7" font-family="sans-serif">평균 응답: 3초</text>
  </g>
  <!-- Floating elements -->
  <circle cx="40" cy="30" r="5" fill="#43E97B" opacity="0.2"/>
  <circle cx="240" cy="220" r="4" fill="#38F9D7" opacity="0.3"/>
</svg>