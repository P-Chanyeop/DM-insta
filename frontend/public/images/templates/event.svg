<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF7ED"/>
      <stop offset="100%" style="stop-color:#FEF3F2"/>
    </linearGradient>
    <linearGradient id="gift" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F093FB"/>
      <stop offset="100%" style="stop-color:#F5576C"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" rx="16" fill="url(#bg)"/>
  <!-- Gift box -->
  <g transform="translate(60, 50)">
    <rect x="10" y="50" width="100" height="80" rx="8" fill="url(#gift)"/>
    <rect x="5" y="40" width="110" height="20" rx="6" fill="url(#gift)" opacity="0.8"/>
    <!-- Ribbon -->
    <rect x="52" y="40" width="16" height="90" rx="2" fill="white" opacity="0.3"/>
    <rect x="5" y="45" width="110" height="10" rx="2" fill="white" opacity="0.2"/>
    <!-- Bow -->
    <ellipse cx="50" cy="38" rx="14" ry="10" fill="#F5576C"/>
    <ellipse cx="70" cy="38" rx="14" ry="10" fill="#F093FB"/>
    <circle cx="60" cy="38" r="5" fill="white" opacity="0.6"/>
  </g>
  <!-- Confetti -->
  <rect x="40" y="30" width="8" height="4" rx="2" fill="#F59E0B" transform="rotate(25 44 32)"/>
  <rect x="160" y="25" width="8" height="4" rx="2" fill="#F093FB" transform="rotate(-15 164 27)"/>
  <rect x="180" y="80" width="6" height="4" rx="2" fill="#6366F1" transform="rotate(45 183 82)"/>
  <circle cx="150" cy="55" r="4" fill="#4ECDC4" opacity="0.6"/>
  <circle cx="35" cy="100" r="3" fill="#F97316" opacity="0.5"/>
  <rect x="120" y="150" width="6" height="4" rx="2" fill="#EC4899" transform="rotate(-30 123 152)"/>
  <!-- Stars -->
  <path d="M190 40 L192 46 L198 46 L193 50 L195 56 L190 52 L185 56 L187 50 L182 46 L188 46 Z" fill="#F59E0B" opacity="0.7"/>
  <path d="M50 170 L52 174 L56 174 L53 177 L54 181 L50 178 L46 181 L47 177 L44 174 L48 174 Z" fill="#F093FB" opacity="0.5"/>
  <!-- Phone with event DM -->
  <g transform="translate(240, 30)">
    <rect width="120" height="180" rx="16" fill="white" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="12" y="20" width="96" height="145" rx="4" fill="#F8FAFC"/>
    <rect x="16" y="28" width="88" height="32" rx="8" fill="url(#gift)" opacity="0.15"/>
    <text x="28" y="42" font-size="8" fill="#F5576C" font-weight="bold" font-family="sans-serif">EVENT</text>
    <text x="28" y="54" font-size="7" fill="#94A3B8" font-family="sans-serif">참여 감사합니다!</text>
    <rect x="16" y="66" width="75" height="22" rx="11" fill="url(#gift)"/>
    <text x="24" y="81" font-size="8" fill="white" font-family="sans-serif">경품 확인하기</text>
    <rect x="16" y="96" width="88" height="50" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <text x="24" y="112" font-size="7" fill="#475569" font-family="sans-serif">당첨 확률 UP!</text>
    <text x="24" y="126" font-size="7" fill="#94A3B8" font-family="sans-serif">친구 태그하면</text>
    <text x="24" y="138" font-size="7" fill="#94A3B8" font-family="sans-serif">추가 응모 기회</text>
  </g>
</svg>