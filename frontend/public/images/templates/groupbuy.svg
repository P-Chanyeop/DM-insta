<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF2F2"/>
      <stop offset="100%" style="stop-color:#FFF7ED"/>
    </linearGradient>
    <linearGradient id="fire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" rx="16" fill="url(#bg)"/>
  <!-- Group of people -->
  <g transform="translate(40, 60)">
    <circle cx="40" cy="50" r="20" fill="url(#fire)" opacity="0.2"/>
    <circle cx="40" cy="42" r="12" fill="url(#fire)" opacity="0.6"/>
    <ellipse cx="40" cy="68" rx="16" ry="10" fill="url(#fire)" opacity="0.4"/>

    <circle cx="80" cy="55" r="18" fill="url(#fire)" opacity="0.15"/>
    <circle cx="80" cy="48" r="10" fill="url(#fire)" opacity="0.5"/>
    <ellipse cx="80" cy="70" rx="14" ry="8" fill="url(#fire)" opacity="0.3"/>

    <circle cx="0" cy="55" r="18" fill="url(#fire)" opacity="0.15"/>
    <circle cx="0" cy="48" r="10" fill="url(#fire)" opacity="0.5"/>
    <ellipse cx="0" cy="70" rx="14" ry="8" fill="url(#fire)" opacity="0.3"/>
  </g>
  <!-- Progress bar -->
  <g transform="translate(40, 155)">
    <rect width="150" height="10" rx="5" fill="#FEE2E2"/>
    <rect width="105" height="10" rx="5" fill="url(#fire)"/>
    <text x="0" y="28" font-size="9" fill="#EF4444" font-weight="bold" font-family="sans-serif">70% 달성!</text>
    <text x="75" y="28" font-size="8" fill="#94A3B8" font-family="sans-serif">목표 50명</text>
  </g>
  <!-- Timer -->
  <g transform="translate(80, 190)">
    <rect width="80" height="26" rx="13" fill="url(#fire)" opacity="0.1"/>
    <text x="14" y="18" font-size="9" fill="#EF4444" font-family="sans-serif">23:45:12</text>
  </g>
  <!-- Phone with carousel -->
  <g transform="translate(240, 25)">
    <rect width="125" height="190" rx="16" fill="white" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="10" y="20" width="105" height="155" rx="4" fill="#F8FAFC"/>
    <!-- Carousel cards -->
    <rect x="14" y="28" width="70" height="80" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="18" y="32" width="62" height="40" rx="4" fill="url(#fire)" opacity="0.15"/>
    <text x="30" y="56" font-size="10" fill="#EF4444" font-family="sans-serif">상품A</text>
    <text x="22" y="82" font-size="7" fill="#475569" font-family="sans-serif">공구가 29,000</text>
    <rect x="22" y="90" width="50" height="14" rx="4" fill="url(#fire)"/>
    <text x="32" y="100" font-size="7" fill="white" font-family="sans-serif">선택</text>
    <!-- Second card peek -->
    <rect x="88" y="32" width="24" height="76" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" opacity="0.7"/>
    <!-- Bottom action -->
    <rect x="14" y="116" width="97" height="28" rx="6" fill="url(#fire)" opacity="0.9"/>
    <text x="28" y="134" font-size="9" fill="white" font-weight="bold" font-family="sans-serif">공구 신청하기</text>
    <text x="14" y="158" font-size="7" fill="#94A3B8" font-family="sans-serif">재고: 15개 남음</text>
    <text x="14" y="170" font-size="7" fill="#EF4444" font-family="sans-serif">마감 임박!</text>
  </g>
  <!-- Fire emoji style -->
  <circle cx="30" cy="35" r="5" fill="#F97316" opacity="0.3"/>
  <circle cx="220" cy="210" r="4" fill="#EF4444" opacity="0.2"/>
</svg>