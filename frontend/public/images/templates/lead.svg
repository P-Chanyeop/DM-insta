<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EEF2FF"/>
      <stop offset="100%" style="stop-color:#F5F3FF"/>
    </linearGradient>
    <linearGradient id="mail" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667EEA"/>
      <stop offset="100%" style="stop-color:#764BA2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" rx="16" fill="url(#bg)"/>
  <!-- Email envelope -->
  <g transform="translate(50, 55)">
    <rect x="0" y="20" width="130" height="90" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <path d="M0 32 L65 72 L130 32" stroke="url(#mail)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M0 110 L45 75" stroke="#E2E8F0" stroke-width="1.5" fill="none"/>
    <path d="M130 110 L85 75" stroke="#E2E8F0" stroke-width="1.5" fill="none"/>
    <!-- @ symbol -->
    <circle cx="65" cy="56" r="20" fill="url(#mail)" opacity="0.1"/>
    <text x="53" y="63" font-size="18" fill="#667EEA" font-weight="bold" font-family="sans-serif">@</text>
  </g>
  <!-- Contact cards floating -->
  <g transform="translate(100, 25)">
    <rect width="60" height="36" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" opacity="0.8"/>
    <circle cx="16" cy="18" r="8" fill="#667EEA" opacity="0.3"/>
    <rect x="28" y="12" width="24" height="4" rx="2" fill="#CBD5E1"/>
    <rect x="28" y="20" width="18" height="3" rx="1.5" fill="#E2E8F0"/>
  </g>
  <g transform="translate(30, 160)">
    <rect width="60" height="36" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1" opacity="0.7"/>
    <circle cx="16" cy="18" r="8" fill="#764BA2" opacity="0.3"/>
    <rect x="28" y="12" width="24" height="4" rx="2" fill="#CBD5E1"/>
    <rect x="28" y="20" width="18" height="3" rx="1.5" fill="#E2E8F0"/>
  </g>
  <!-- Phone -->
  <g transform="translate(240, 30)">
    <rect width="120" height="180" rx="16" fill="white" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="12" y="20" width="96" height="145" rx="4" fill="#F8FAFC"/>
    <rect x="16" y="28" width="72" height="22" rx="11" fill="url(#mail)"/>
    <text x="24" y="43" font-size="8" fill="white" font-family="sans-serif">이메일 입력</text>
    <rect x="16" y="58" width="88" height="32" rx="6" fill="white" stroke="#CBD5E1" stroke-width="1"/>
    <text x="24" y="78" font-size="8" fill="#94A3B8" font-family="sans-serif">email@example.com</text>
    <rect x="16" y="98" width="88" height="28" rx="6" fill="url(#mail)"/>
    <text x="40" y="116" font-size="9" fill="white" font-family="sans-serif">제출하기</text>
    <text x="16" y="142" font-size="7" fill="#94A3B8" font-family="sans-serif">무료 가이드를</text>
    <text x="16" y="154" font-size="7" fill="#94A3B8" font-family="sans-serif">이메일로 보내드려요!</text>
  </g>
  <!-- Floating dots -->
  <circle cx="200" cy="25" r="4" fill="#667EEA" opacity="0.2"/>
  <circle cx="215" cy="200" r="5" fill="#764BA2" opacity="0.15"/>
</svg>