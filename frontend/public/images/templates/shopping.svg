<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF1F2"/>
      <stop offset="100%" style="stop-color:#FDE8EF"/>
    </linearGradient>
    <linearGradient id="bag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D"/>
      <stop offset="100%" style="stop-color:#C44AFF"/>
    </linearGradient>
    <linearGradient id="phone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F8FAFC"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" rx="16" fill="url(#bg)"/>
  <!-- Phone mockup -->
  <rect x="240" y="30" width="120" height="180" rx="16" fill="url(#phone)" stroke="#E2E8F0" stroke-width="2"/>
  <rect x="252" y="50" width="96" height="145" rx="4" fill="#F8FAFC"/>
  <!-- Chat bubbles -->
  <rect x="256" y="56" width="70" height="24" rx="12" fill="#FF6B9D" opacity="0.9"/>
  <text x="270" y="72" font-size="9" fill="white" font-family="sans-serif">상품 안내</text>
  <rect x="268" y="86" width="76" height="20" rx="10" fill="#F1F5F9"/>
  <text x="276" y="100" font-size="8" fill="#64748B" font-family="sans-serif">30% 할인!</text>
  <rect x="256" y="112" width="88" height="28" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="264" y="130" font-size="8" fill="#6366F1" font-family="sans-serif">지금 구매하기</text>
  <!-- Shopping bag icon -->
  <g transform="translate(60, 50)">
    <rect x="20" y="40" width="80" height="90" rx="12" fill="url(#bag)" opacity="0.9"/>
    <path d="M50 40 V25 C50 15 60 10 70 10 C80 10 90 15 90 25 V40" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="55" cy="70" r="4" fill="white" opacity="0.8"/>
    <circle cx="85" cy="70" r="4" fill="white" opacity="0.8"/>
    <rect x="40" y="85" width="40" height="3" rx="1.5" fill="white" opacity="0.6"/>
    <rect x="45" y="93" width="30" height="3" rx="1.5" fill="white" opacity="0.4"/>
  </g>
  <!-- Discount tag -->
  <g transform="translate(140, 140)">
    <circle cx="20" cy="20" r="24" fill="#F97316" opacity="0.9"/>
    <text x="8" y="18" font-size="10" fill="white" font-weight="bold" font-family="sans-serif">30%</text>
    <text x="11" y="30" font-size="8" fill="white" font-family="sans-serif">OFF</text>
  </g>
  <!-- Floating elements -->
  <circle cx="45" cy="40" r="6" fill="#FF6B9D" opacity="0.3"/>
  <circle cx="200" cy="30" r="4" fill="#C44AFF" opacity="0.3"/>
  <circle cx="180" cy="200" r="5" fill="#F97316" opacity="0.2"/>
</svg>