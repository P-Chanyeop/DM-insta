<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ECFDF5"/>
      <stop offset="100%" style="stop-color:#E0F2FE"/>
    </linearGradient>
    <linearGradient id="cal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4"/>
      <stop offset="100%" style="stop-color:#44B09E"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" rx="16" fill="url(#bg)"/>
  <!-- Calendar -->
  <g transform="translate(50, 40)">
    <rect width="140" height="150" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect width="140" height="36" rx="16" fill="url(#cal)"/>
    <rect x="0" y="20" width="140" height="16" fill="url(#cal)"/>
    <text x="40" y="28" font-size="12" fill="white" font-weight="bold" font-family="sans-serif">4월 2026</text>
    <!-- Calendar grid -->
    <text x="12" y="60" font-size="8" fill="#94A3B8" font-family="sans-serif">월  화  수  목  금  토  일</text>
    <text x="12" y="78" font-size="9" fill="#475569" font-family="sans-serif"> 1   2   3   4   5   6   7</text>
    <text x="12" y="94" font-size="9" fill="#475569" font-family="sans-serif"> 8   9  10  11  12  13  14</text>
    <text x="12" y="110" font-size="9" fill="#475569" font-family="sans-serif">15  16  17  18  19  20  21</text>
    <!-- Highlight today -->
    <circle cx="100" cy="105" r="11" fill="#4ECDC4" opacity="0.2"/>
    <circle cx="100" cy="105" r="8" fill="#4ECDC4"/>
    <text x="96" y="109" font-size="8" fill="white" font-family="sans-serif">21</text>
    <text x="12" y="126" font-size="9" fill="#475569" font-family="sans-serif">22  23  24  25  26  27  28</text>
    <text x="12" y="142" font-size="9" fill="#475569" font-family="sans-serif">29  30</text>
  </g>
  <!-- Phone with booking DM -->
  <g transform="translate(240, 30)">
    <rect width="120" height="180" rx="16" fill="white" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="12" y="20" width="96" height="145" rx="4" fill="#F8FAFC"/>
    <rect x="16" y="30" width="72" height="22" rx="11" fill="#4ECDC4"/>
    <text x="24" y="45" font-size="8" fill="white" font-family="sans-serif">예약 안내</text>
    <rect x="20" y="60" width="84" height="40" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <text x="28" y="76" font-size="7" fill="#475569" font-family="sans-serif">오늘 14:00</text>
    <text x="28" y="90" font-size="7" fill="#4ECDC4" font-family="sans-serif">예약 가능</text>
    <rect x="20" y="108" width="84" height="40" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <text x="28" y="124" font-size="7" fill="#475569" font-family="sans-serif">오늘 16:00</text>
    <text x="28" y="138" font-size="7" fill="#4ECDC4" font-family="sans-serif">예약 가능</text>
  </g>
  <!-- Clock icon -->
  <g transform="translate(200, 170)">
    <circle cx="20" cy="20" r="20" fill="#4ECDC4" opacity="0.15"/>
    <circle cx="20" cy="20" r="14" stroke="#4ECDC4" stroke-width="2" fill="none"/>
    <line x1="20" y1="20" x2="20" y2="12" stroke="#4ECDC4" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="20" x2="26" y2="22" stroke="#4ECDC4" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>