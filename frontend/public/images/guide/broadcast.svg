<svg xmlns="http://www.w3.org/2000/svg" width="400" height="240" viewBox="0 0 400 240">
  <rect width="400" height="240" rx="12" fill="#FFFBEB"/>
  <!-- Header -->
  <text x="24" y="40" font-family="sans-serif" font-size="16" fill="#333" font-weight="700">브로드캐스팅</text>
  <rect x="270" y="20" width="112" height="32" rx="8" fill="#f59e0b"/>
  <text x="278" y="41" font-family="sans-serif" font-size="11" fill="#fff" font-weight="600">+ 새 브로드캐스트</text>
  <!-- Recipients section -->
  <rect x="20" y="64" width="170" height="156" rx="10" fill="#fff" stroke="#f59e0b" stroke-opacity="0.15"/>
  <text x="32" y="86" font-family="sans-serif" font-size="11" fill="#333" font-weight="600">수신자 선택</text>
  <rect x="32" y="96" width="146" height="28" rx="6" fill="#FFFBEB" stroke="#f59e0b" stroke-opacity="0.2"/>
  <text x="42" y="114" font-family="sans-serif" font-size="10" fill="#999">태그로 검색...</text>
  <!-- Tag chips -->
  <rect x="32" y="132" width="46" height="22" rx="11" fill="#f59e0b" opacity="0.15"/>
  <text x="40" y="147" font-family="sans-serif" font-size="9" fill="#b45309">VIP</text>
  <rect x="84" y="132" width="46" height="22" rx="11" fill="#f59e0b" opacity="0.15"/>
  <text x="92" y="147" font-family="sans-serif" font-size="9" fill="#b45309">신규</text>
  <rect x="136" y="132" width="40" height="22" rx="11" fill="#f59e0b" opacity="0.15"/>
  <text x="143" y="147" font-family="sans-serif" font-size="9" fill="#b45309">전체</text>
  <text x="32" y="178" font-family="sans-serif" font-size="11" fill="#666">선택된 수신자:</text>
  <text x="32" y="198" font-family="sans-serif" font-size="18" fill="#f59e0b" font-weight="700">1,247명</text>
  <!-- Message section -->
  <rect x="202" y="64" width="178" height="156" rx="10" fill="#fff" stroke="#f59e0b" stroke-opacity="0.15"/>
  <text x="214" y="86" font-family="sans-serif" font-size="11" fill="#333" font-weight="600">메시지 편집</text>
  <rect x="214" y="96" width="154" height="80" rx="6" fill="#FFFBEB" stroke="#f59e0b" stroke-opacity="0.2"/>
  <text x="224" y="116" font-family="sans-serif" font-size="10" fill="#666">안녕하세요! {{이름}}님,</text>
  <text x="224" y="132" font-family="sans-serif" font-size="10" fill="#666">새로운 프로모션을</text>
  <text x="224" y="148" font-family="sans-serif" font-size="10" fill="#666">안내드립니다...</text>
  <rect x="214" y="186" width="154" height="28" rx="6" fill="#f59e0b"/>
  <text x="260" y="205" font-family="sans-serif" font-size="11" fill="#fff" font-weight="600">발송하기</text>
</svg>