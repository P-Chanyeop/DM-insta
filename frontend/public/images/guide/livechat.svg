<svg xmlns="http://www.w3.org/2000/svg" width="400" height="240" viewBox="0 0 400 240">
  <rect width="400" height="240" rx="12" fill="#EFF6FF"/>
  <!-- Left: conversation list -->
  <rect x="12" y="12" width="130" height="216" rx="8" fill="#fff" stroke="#3b82f6" stroke-opacity="0.12"/>
  <text x="22" y="34" font-family="sans-serif" font-size="11" fill="#333" font-weight="700">대화 목록</text>
  <!-- Contact 1 (active) -->
  <rect x="18" y="44" width="118" height="40" rx="6" fill="#3b82f6" opacity="0.08"/>
  <circle cx="36" cy="64" r="12" fill="#3b82f6" opacity="0.2"/>
  <circle cx="36" cy="61" r="4" fill="#3b82f6" opacity="0.5"/>
  <ellipse cx="36" cy="70" rx="6" ry="4" fill="#3b82f6" opacity="0.3"/>
  <text x="54" y="60" font-family="sans-serif" font-size="10" fill="#333" font-weight="600">김민수</text>
  <text x="54" y="74" font-family="sans-serif" font-size="8" fill="#999">가격 문의드려요</text>
  <circle cx="126" cy="58" r="4" fill="#3b82f6"/>
  <!-- Contact 2 -->
  <rect x="18" y="90" width="118" height="40" rx="6" fill="transparent"/>
  <circle cx="36" cy="110" r="12" fill="#ddd"/>
  <circle cx="36" cy="107" r="4" fill="#bbb"/>
  <ellipse cx="36" cy="116" rx="6" ry="4" fill="#bbb"/>
  <text x="54" y="106" font-family="sans-serif" font-size="10" fill="#666">이지은</text>
  <text x="54" y="120" font-family="sans-serif" font-size="8" fill="#bbb">감사합니다!</text>
  <!-- Contact 3 -->
  <rect x="18" y="136" width="118" height="40" rx="6" fill="transparent"/>
  <circle cx="36" cy="156" r="12" fill="#ddd"/>
  <circle cx="36" cy="153" r="4" fill="#bbb"/>
  <ellipse cx="36" cy="162" rx="6" ry="4" fill="#bbb"/>
  <text x="54" y="152" font-family="sans-serif" font-size="10" fill="#666">박준호</text>
  <text x="54" y="166" font-family="sans-serif" font-size="8" fill="#bbb">배송 언제 되나요?</text>
  <!-- Right: chat area -->
  <rect x="150" y="12" width="238" height="216" rx="8" fill="#fff" stroke="#3b82f6" stroke-opacity="0.12"/>
  <text x="166" y="34" font-family="sans-serif" font-size="12" fill="#333" font-weight="700">김민수</text>
  <line x1="150" y1="44" x2="388" y2="44" stroke="#eee"/>
  <!-- Received message -->
  <rect x="166" y="56" width="140" height="32" rx="12" fill="#F0F4FF"/>
  <text x="178" y="76" font-family="sans-serif" font-size="10" fill="#555">이 상품 가격 문의드려요</text>
  <!-- Sent message -->
  <rect x="240" y="100" width="136" height="32" rx="12" fill="#3b82f6"/>
  <text x="252" y="120" font-family="sans-serif" font-size="10" fill="#fff">안녕하세요! 50,000원입니다</text>
  <!-- Received -->
  <rect x="166" y="144" width="100" height="28" rx="12" fill="#F0F4FF"/>
  <text x="178" y="162" font-family="sans-serif" font-size="10" fill="#555">할인 가능한가요?</text>
  <!-- Input bar -->
  <rect x="158" y="192" width="180" height="28" rx="14" fill="#F5F5F5" stroke="#ddd"/>
  <text x="172" y="210" font-family="sans-serif" font-size="10" fill="#bbb">메시지를 입력하세요...</text>
  <rect x="344" y="192" width="38" height="28" rx="14" fill="#3b82f6"/>
  <text x="350" y="210" font-family="sans-serif" font-size="10" fill="#fff">전송</text>
</svg>