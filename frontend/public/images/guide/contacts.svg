  <circle cx="290" cy="170" r="5" fill="#22c55e"/>
  <text x="300" y="174" font-family="sans-serif" font-size="10" fill="#666">활성</text>
  <!-- Row 3 -->
  <line x1="20" y1="188" x2="380" y2="188" stroke="#f0f0f0"/>
