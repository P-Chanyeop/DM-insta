  <!-- Row 2 -->
  <line x1="20" y1="150" x2="380" y2="150" stroke="#f0f0f0"/>
  <rect x="20" y="152" width="360" height="36" rx="0" fill="#fff"/>
  <circle cx="36" cy="170" r="10" fill="#f59e0b" opacity="0.15"/>
  <text x="32" y="174" font-family="sans-serif" font-size="9" fill="#f59e0b">L</text>
  <text x="52" y="174" font-family="sans-serif" font-size="11" fill="#333">이지은</text>
  <rect x="160" y="162" width="34" height="18" rx="9" fill="#3b82f6" opacity="0.12"/>
