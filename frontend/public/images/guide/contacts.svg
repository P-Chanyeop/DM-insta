  <text x="32" y="136" font-family="sans-serif" font-size="9" fill="#8b5cf6">K</text>
  <text x="52" y="136" font-family="sans-serif" font-size="11" fill="#333">김민수</text>
  <rect x="160" y="124" width="34" height="18" rx="9" fill="#8b5cf6" opacity="0.12"/>
  <text x="167" y="137" font-family="sans-serif" font-size="8" fill="#8b5cf6">VIP</text>
  <rect x="200" y="124" width="40" height="18" rx="9" fill="#10b981" opacity="0.12"/>
  <text x="207" y="137" font-family="sans-serif" font-size="8" fill="#10b981">구매</text>
  <circle cx="290" cy="132" r="5" fill="#22c55e"/>
