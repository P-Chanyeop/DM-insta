<svg xmlns="http://www.w3.org/2000/svg" width="400" height="240" viewBox="0 0 400 240">
  <rect width="400" height="240" rx="12" fill="#EEF2FF"/>
  <!-- Header -->
  <text x="24" y="40" font-family="sans-serif" font-size="16" fill="#333" font-weight="700">자동화 플로우</text>
  <rect x="290" y="20" width="90" height="32" rx="8" fill="#6366f1"/>
  <text x="304" y="41" font-family="sans-serif" font-size="12" fill="#fff" font-weight="600">+ 새 플로우</text>
  <!-- Flow card 1 -->
  <rect x="20" y="64" width="360" height="68" rx="10" fill="#fff" stroke="#6366f1" stroke-opacity="0.15"/>
  <rect x="36" y="80" width="36" height="36" rx="8" fill="#6366f1" opacity="0.12"/>
  <text x="46" y="104" font-family="sans-serif" font-size="16">🔔</text>
  <text x="84" y="92" font-family="sans-serif" font-size="13" fill="#333" font-weight="600">환영 메시지</text>
  <text x="84" y="110" font-family="sans-serif" font-size="10" fill="#999">팔로워가 DM을 보내면 자동 응답</text>
  <!-- Toggle on -->
  <rect x="332" y="88" width="36" height="20" rx="10" fill="#6366f1"/>
  <circle cx="356" cy="98" r="8" fill="#fff"/>
  <!-- Flow card 2 -->
  <rect x="20" y="144" width="360" height="68" rx="10" fill="#fff" stroke="#6366f1" stroke-opacity="0.15"/>
  <rect x="36" y="160" width="36" height="36" rx="8" fill="#6366f1" opacity="0.12"/>
  <text x="46" y="184" font-family="sans-serif" font-size="16">🛒</text>
  <text x="84" y="172" font-family="sans-serif" font-size="13" fill="#333" font-weight="600">주문 확인</text>
  <text x="84" y="190" font-family="sans-serif" font-size="10" fill="#999">키워드 "주문"이 포함되면 자동 안내</text>
  <!-- Toggle off -->
  <rect x="332" y="168" width="36" height="20" rx="10" fill="#ddd"/>
  <circle cx="344" cy="178" r="8" fill="#fff"/>
</svg>