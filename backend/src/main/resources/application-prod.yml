# 운영 환경: Lightsail Managed MySQL + Hibernate auto DDL
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:sendit}?useSSL=true&requireSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 10000

  jpa:
    hibernate:
      # Flyway 로 스키마 관리 전환 이후에는 validate 로 두어 엔티티/DB 불일치를 조기 감지.
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

  # Flyway 마이그레이션 — 기존 DB 는 Hibernate ddl-auto 로 키워졌으므로 baseline=17 로
  # 시작해 V1~V17 은 "이미 적용된 것"으로 간주, V18 이상부터 새로 적용.
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 17
    baseline-description: "Hibernate ddl-auto 로 만들어진 스키마 기준 baseline (paddle 컬럼 수동 정리 후)"
    validate-on-migrate: false

  h2:
    console:
      enabled: false

# Server
server:
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024

# Logging
logging:
  level:
    root: WARN
    com.instabot: INFO
    org.springframework: WARN
    org.hibernate: WARN
    org.flywaydb: INFO

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
