spring:
  application:
    name: instabot-backend

  datasource:
    url: jdbc:h2:mem:instabotdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# JWT
jwt:
  secret: instabot-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000

# Instagram API (placeholder)
instagram:
  api:
    base-url: https://graph.instagram.com
    app-id: ${INSTAGRAM_APP_ID:your-app-id}
    app-secret: ${INSTAGRAM_APP_SECRET:your-app-secret}

# CORS
cors:
  allowed-origins: http://localhost:5173,http://localhost:3000
