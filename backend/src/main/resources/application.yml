spring:
  application:
    name: instabot-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  flyway:
    enabled: false

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# JWT
jwt:
  secret: ${JWT_SECRET:instabot-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration: ${JWT_EXPIRATION:86400000}

# Instagram API (placeholder)
instagram:
  api:
    base-url: https://graph.instagram.com
    app-id: ${INSTAGRAM_APP_ID:your-app-id}
    app-secret: ${INSTAGRAM_APP_SECRET:your-app-secret}

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
