spring:
  application:
    name: sendit-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  flyway:
    enabled: false

  # Email (Gmail SMTP)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true
            required: true

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=30s

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# JWT
jwt:
  secret: ${JWT_SECRET:instabot-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration: ${JWT_EXPIRATION:86400000}

# Instagram API (placeholder)
instagram:
  api:
    base-url: https://graph.instagram.com
    app-id: ${INSTAGRAM_APP_ID:your-app-id}
    app-secret: ${INSTAGRAM_APP_SECRET:your-app-secret}
  oauth:
    redirect-uri: ${INSTAGRAM_OAUTH_REDIRECT_URI:http://localhost:8080/api/auth/instagram/callback}
  webhook:
    verify-token: ${INSTAGRAM_WEBHOOK_VERIFY_TOKEN:instabot-webhook-verify-token}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# Encryption (AES-256 for access token storage)
encryption:
  secret: ${ENCRYPTION_SECRET:sendit-encryption-secret-change-in-production}

# App
app:
  base-url: ${APP_BASE_URL:http://localhost:5173}

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
