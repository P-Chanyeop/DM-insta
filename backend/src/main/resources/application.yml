spring:
  application:
    name: sendit-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  flyway:
    enabled: false

  # 모든 LocalDateTime/Instant 직렬화 타임존을 KST 로 고정 —
  # 프론트 new Date(isoString) 파싱 결과가 서버·사용자 시간대와 일치하도록.
  jackson:
    time-zone: Asia/Seoul

  # Email (Gmail SMTP)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true
            required: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=30s

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# JWT
jwt:
  secret: ${JWT_SECRET:instabot-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration: ${JWT_EXPIRATION:86400000}

# Instagram API (placeholder)
instagram:
  api:
    base-url: https://graph.instagram.com
    app-id: ${INSTAGRAM_APP_ID:your-app-id}
    app-secret: ${INSTAGRAM_APP_SECRET:your-app-secret}
  oauth:
    redirect-uri: ${INSTAGRAM_OAUTH_REDIRECT_URI:http://localhost:8080/api/auth/instagram/callback}
  webhook:
    verify-token: ${INSTAGRAM_WEBHOOK_VERIFY_TOKEN:instabot-webhook-verify-token}

# 토스페이먼츠 정기결제 (빌링키 기반)
# 가맹점(MID): bill_sendiomau — 자동결제(빌링) 전용 MID
# API 개별 연동 키: https://docs.tosspayments.com/reference/using-api/api-keys
toss:
  client-key: ${TOSS_CLIENT_KEY:test_ck_4yKeq5bgrp56k0GoJ4Rx8GX0lzW6}
  secret-key: ${TOSS_SECRET_KEY:test_sk_kYG57Eba3GRnGEBvmlwE8pWDOxmA}
  prices:
    starter: ${TOSS_PRICE_STARTER:19900}
    pro: ${TOSS_PRICE_PRO:49900}
    business: ${TOSS_PRICE_BUSINESS:149900}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# Encryption (AES-256 for access token storage)
encryption:
  secret: ${ENCRYPTION_SECRET:sendit-encryption-secret-change-in-production}

# App
app:
  base-url: ${APP_BASE_URL:http://localhost:5173}
  upload-dir: ${UPLOAD_DIR:uploads}

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Sentry (production error tracking — set DSN to enable)
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SPRING_PROFILES_ACTIVE:dev}

# Rate Limiting
rate-limit:
  enabled: ${RATE_LIMIT_ENABLED:true}
