spring:
  application:
    name: sendit-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  flyway:
    enabled: false

  # Email (Gmail SMTP)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true
            required: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=30s

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# JWT
jwt:
  secret: ${JWT_SECRET:instabot-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration: ${JWT_EXPIRATION:86400000}

# Instagram API (placeholder)
instagram:
  api:
    base-url: https://graph.instagram.com
    app-id: ${INSTAGRAM_APP_ID:your-app-id}
    app-secret: ${INSTAGRAM_APP_SECRET:your-app-secret}
  oauth:
    redirect-uri: ${INSTAGRAM_OAUTH_REDIRECT_URI:http://localhost:8080/api/auth/instagram/callback}
  webhook:
    verify-token: ${INSTAGRAM_WEBHOOK_VERIFY_TOKEN:instabot-webhook-verify-token}

# Paddle Billing
paddle:
  api-key: ${PADDLE_API_KEY:pdl_api_test_placeholder}
  webhook-secret: ${PADDLE_WEBHOOK_SECRET:pdl_ntfset_placeholder}
  environment: ${PADDLE_ENVIRONMENT:sandbox}
  client-token: ${PADDLE_CLIENT_TOKEN:test_placeholder}
  prices:
    starter: ${PADDLE_PRICE_STARTER:pri_starter_placeholder}
    pro: ${PADDLE_PRICE_PRO:pri_pro_placeholder}
    business: ${PADDLE_PRICE_BUSINESS:pri_business_placeholder}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# Encryption (AES-256 for access token storage)
encryption:
  secret: ${ENCRYPTION_SECRET:sendit-encryption-secret-change-in-production}

# App
app:
  base-url: ${APP_BASE_URL:http://localhost:5173}
  upload-dir: ${UPLOAD_DIR:uploads}

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Sentry (production error tracking — set DSN to enable)
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SPRING_PROFILES_ACTIVE:dev}

# Rate Limiting
rate-limit:
  enabled: ${RATE_LIMIT_ENABLED:true}
