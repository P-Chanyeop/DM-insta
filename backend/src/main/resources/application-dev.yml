# 개발 환경: H2 인메모리 DB (Flyway 비활성)
spring:
  datasource:
    url: jdbc:h2:mem:instabotdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false
